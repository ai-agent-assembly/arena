name: Scheduled Arena Matches

# Runs real Arena matches (AAASM-4428) on a schedule so `reports/`
# (latest.json, leaderboard.json, matches/<match-id>/…) reflects genuine,
# recently-run match results instead of sitting frozen at whatever the last
# manual `aasm-arena run` happened to produce. The two hand-generated static
# fixtures under `docs/samples/` are unaffected — those stay as deterministic,
# always-available examples of the report shape (see
# `scripts/generate_report_samples.py`), independent of this workflow.
#
# Loop-avoidance (two layers):
#   1. Primary: this workflow's report-refresh commit is pushed using the
#      job's own default `GITHUB_TOKEN` (via `actions/checkout`'s persisted
#      credentials). GitHub does not queue new workflow runs for pushes/PRs
#      made with the GITHUB_TOKEN itself (see "Triggering a workflow from a
#      workflow" in GitHub's docs on automatic token authentication) — so
#      this push cannot cause `ci.yml`/`documentation.yml` (both
#      `push: branches: [main]`) to run at all, regardless of what changed.
#   2. Defense in depth: the commit message also carries `[skip ci]`, which
#      GitHub recognizes repo-wide for any `push`/`pull_request`-triggered
#      workflow. This keeps the same guarantee even if this workflow is ever
#      changed to push with a PAT instead of `GITHUB_TOKEN` (which *would*
#      otherwise be able to trigger other workflows).
#   3. This workflow itself only listens to `schedule`/`workflow_dispatch` —
#      it is never `push`-triggered — so there is no path back into itself
#      either way.
on:
  schedule:
    # Once a day. Arena's official-agent matrix is small (5 agents x the one
    # registered scenario today) and deterministic (`--adapter fake`, the
    # CLI default), so there's no need for a tighter cadence yet — revisit if
    # a real (non-fake) adapter or a larger scenario/agent matrix makes more
    # frequent runs meaningful.
    - cron: "23 7 * * *"
  # Manual trigger — useful for testing this workflow, or for refreshing
  # reports/ on demand without waiting for the next scheduled run.
  workflow_dispatch: {}

permissions:
  contents: read

# Serialize runs so two overlapping matrices never race to commit/push the
# same `reports/` refresh (a canceled mid-push run could leave main in a
# half-committed state, so runs queue rather than cancel each other).
concurrency:
  group: scheduled-matches
  cancel-in-progress: false

jobs:
  run-matches:
    name: Run scheduled Arena matches and refresh report index
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked --no-build --no-binary-package arena

      # AAASM-4406: confirm, in the run's own summary, that this workflow
      # never opts into real, paid LLM calls before any match actually
      # runs. None of the `aasm-arena run` invocations below pass
      # `--llm-mode` (so every match uses the CLI's own `mock` default —
      # see `arena.runner.llm_mode`'s module docstring), and this job's
      # `env` never sets `AASM_ARENA_LIVE_LLM` — so this check reports the
      # actual state of the workflow, not just a claim.
      - name: Summarize LLM execution mode
        run: |
          {
            echo "### LLM execution mode"
            echo ""
            if [ "${AASM_ARENA_LIVE_LLM:-}" = "true" ]; then
              echo "⚠️ **live** — \`AASM_ARENA_LIVE_LLM=true\` is set. Real, paid model API calls are enabled for this run's matches."
            else
              echo "✅ **mock** (default) — live LLM calls are disabled. \`AASM_ARENA_LIVE_LLM\` is not set to \`true\` in this workflow, and none of the runs below pass \`--llm-mode live\`."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # One `aasm-arena run --agent <id>` per official agent — see
      # agents/official/*/agent.yaml's `scenarios:` list: every official
      # agent today declares only `github-maintainer-dungeon`, so the real
      # eligibility matrix is "5 agents x that one scenario," not a blind
      # 5-agents-x-every-scenario cross product (`AgentRegistry.filter
      # (scenario=...)` is what `aasm-arena run` itself uses to decide
      # compatibility — see `arena.registry.discovery`). Agent ids are
      # spelled out individually rather than discovered via a glob over
      # `agents/official/*` (and `agents/community/*` is never referenced at
      # all) so a new/renamed official agent — or any community submission —
      # can't silently join this scheduled matrix unreviewed.
      #
      # `continue-on-error: true` on each: a match "losing" (an attack
      # getting through, `aasm-arena run` exiting non-zero) is a legitimate,
      # meaningful Arena result worth recording, not a workflow
      # infrastructure failure — see docs/local-execution.md's "What's
      # mocked vs. real" section. A non-zero exit here still shows as a
      # warning in the run summary, but later steps (crucially, the report
      # commit below) always run regardless.
      - name: Run github-maintainer-dungeon — raw-python-issue-triager
        continue-on-error: true
        run: uv run --locked --no-build --no-binary-package arena aasm-arena run github-maintainer-dungeon --agent raw-python-issue-triager

      - name: Run github-maintainer-dungeon — langgraph-docs-agent
        continue-on-error: true
        run: uv run --locked --no-build --no-binary-package arena aasm-arena run github-maintainer-dungeon --agent langgraph-docs-agent

      - name: Run github-maintainer-dungeon — ci-debug-agent
        continue-on-error: true
        run: uv run --locked --no-build --no-binary-package arena aasm-arena run github-maintainer-dungeon --agent ci-debug-agent

      - name: Run github-maintainer-dungeon — release-agent
        continue-on-error: true
        run: uv run --locked --no-build --no-binary-package arena aasm-arena run github-maintainer-dungeon --agent release-agent

      - name: Run github-maintainer-dungeon — mock-malicious-agent
        continue-on-error: true
        run: uv run --locked --no-build --no-binary-package arena aasm-arena run github-maintainer-dungeon --agent mock-malicious-agent

      # AAASM-4398: upload this run's refreshed reports/ as a native Actions
      # artifact, distinct from the git commit below. The commit is the
      # durable, versioned entry point a docs/website consumer fetches from
      # `main`; this artifact instead lets a maintainer grab exactly what
      # one specific workflow run produced (e.g. a match's audit.jsonl)
      # straight from that run's summary page, without checking out git
      # history or waiting on the commit-and-push step to land.
      - name: Upload match reports as workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: arena-match-reports-${{ github.run_id }}
          path: reports/
          retention-days: 30

      # Matches documentation.yml's deploy job's git identity for bot commits.
      - name: Configure git identity for the report refresh commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # AAASM-4505: capture which arena-report.json files this run itself
      # produced, *before* `git add` below stages them — a freshly written
      # report is untracked (`git status --porcelain`'s `??` prefix) at this
      # point, and every match_id is timestamp-derived (see
      # `arena.reports.generate.generate_report`) so a new report from this
      # run is always a new path, never a modification of an existing one.
      # Capturing the list here (rather than after the commit step below)
      # means live issue creation doesn't depend on the commit/push actually
      # succeeding — the report files already exist on disk in this job
      # regardless of git state.
      - name: Identify this run's new match reports
        id: new_reports
        run: |
          files=$(git status --porcelain --untracked-files=all -- reports/matches \
            | awk '{print $2}' | grep -E 'arena-report\.json$' || true)
          {
            echo "files<<ARENA_REPORTS_EOF"
            echo "$files"
            echo "ARENA_REPORTS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check for report changes
        id: report_status
        run: |
          git add reports
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Only commit/push when something under reports/ actually changed —
      # e.g. every match above unexpectedly erroring before writing a report
      # should not produce an empty, no-op commit.
      #
      # Pushes back to whatever ref this run actually checked out
      # (`github.ref_name`) rather than a hardcoded `main`: on `schedule`
      # that's always the default branch, but on `workflow_dispatch` it's
      # whichever branch was selected — so a manual test run dispatched
      # against a feature branch commits its report refresh there instead
      # of accidentally landing on `main`.
      - name: Commit and push refreshed reports
        if: steps.report_status.outputs.changed == 'true'
        env:
          TARGET_REF: ${{ github.ref_name }}
        run: |
          git commit -m "🔧 (reports): Refresh live match reports [skip ci]"
          git pull --rebase origin "$TARGET_REF"
          git push origin "HEAD:$TARGET_REF"

      # AAASM-4505: file real GitHub issues for every real defeat this run's
      # matches produced (`arena.reports.github_issues`, via `aasm-arena
      # reports defeat-issues --no-dry-run`), routed per
      # `arena/reports/defeat_routing.yaml` — most categories route to
      # `ai-agent-assembly/agent-assembly`, a different repo than this one.
      # Fingerprint-based duplicate detection (see that module's docstring)
      # means a repeat defeat across runs skips creating a second issue.
      #
      # Runs against `steps.new_reports.outputs.files` — the report(s) this
      # run itself just wrote (captured above, before `git add`) — never
      # against every report this repo has ever accumulated, and never for a
      # winning match's report (`aasm-arena reports defeat-issues` makes zero
      # GitHub API calls when a report has no defeats — see
      # `arena.reports.github_issues.create_issues_for_report`).
      #
      # This step (and therefore live issue creation) is reachable only from
      # this workflow, which is `schedule`/`workflow_dispatch`-triggered
      # only (see the top of this file) — it never runs on `pull_request`,
      # so a fork/PR can't trigger real issue creation.
      #
      # Requires the `ARENA_DEFEAT_ISSUE_TOKEN` repository secret — a
      # dedicated token with `issues:write` on *both* this repo and
      # `ai-agent-assembly/agent-assembly` (the default per-repo
      # `GITHUB_TOKEN` cannot grant access to a different repo, which is why
      # this doesn't just reuse the `permissions:` block above). `gh` reads
      # this from the `GH_TOKEN` env var below; see `reports/README.md` for
      # how to configure that secret — it is a manual, one-time,
      # repo-admin action, not something this workflow or its code sets up.
      # Until it's configured, `aasm-arena reports defeat-issues
      # --no-dry-run` fails clearly (see
      # `arena.reports.github_issues.GitHubIssueCreationError`) rather than
      # silently skipping issue creation.
      #
      # `continue-on-error: true` mirrors the same reasoning the match-run
      # steps above use: a problem here (missing/expired token, GitHub API
      # hiccup) must not block this run's primary job — landing the
      # `reports/` commit above — but still shows up as a failed step in the
      # run summary rather than being silently swallowed.
      - name: File live GitHub issues for real match defeats
        if: steps.new_reports.outputs.files != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.ARENA_DEFEAT_ISSUE_TOKEN }}
          NEW_REPORT_FILES: ${{ steps.new_reports.outputs.files }}
        run: |
          echo "$NEW_REPORT_FILES" | while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "Filing defeat issues for $file"
            uv run --locked --no-build --no-binary-package arena aasm-arena reports defeat-issues "$file" --no-dry-run
          done
