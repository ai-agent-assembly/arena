name: documentation

# PR-triggered runs build-only (never deploy, never touch gh-pages). Pushes
# to main deploy the "latest" channel to gh-pages via mike, so the docs hub
# (AAASM-4414) can clone it exactly like it already does for python-sdk.
#
# Deliberately out of scope (see AAASM-4411/4413): a release-channel /
# version-switcher deploy job. arena has no version tags or release workflow
# yet — that lands in a later ticket once arena starts cutting releases.
on:
  pull_request:
  push:
    branches:
      - main
  # Operator-driven, on-demand republish of the "latest" channel — no code
  # push required. Reuses the exact same deploy steps as the push trigger.
  workflow_dispatch: {}

# Default to read-only so the PR build-only job inherits least privilege; the
# deploy job opts back into the write scope it needs.
permissions:
  contents: read

# One concurrent deployment so a fast-follow push doesn't race a previous
# deploy on gh-pages.
concurrency:
  group: "docs-pages"
  cancel-in-progress: true

jobs:
  build_documentation:
    name: Build documentation (PR, no deploy)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for mike + git-revision-date plugins)
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install docs dependency group
        run: uv sync --locked --no-build --no-binary-package arena --group docs

      # Regenerate docs/latest-reports.md from the live reports/leaderboard.json
      # and reports/latest.json (AAASM-4429) so the page reflects whatever is
      # currently on `reports/` at build time — see scripts/render_latest_reports_page.py.
      - name: Render latest reports page
        run: uv run --locked --no-build --no-binary-package arena python scripts/render_latest_reports_page.py

      # Regenerate docs/agents-scenarios.md from the live agent manifests
      # under agents/official/ + agents/community/ and scenario specs under
      # scenarios/ (AAASM-4521) so the catalog page reflects whatever is
      # currently on disk at build time — see
      # scripts/render_agents_scenarios_page.py.
      - name: Render agents & scenarios catalog page
        run: uv run --locked --no-build --no-binary-package arena python scripts/render_agents_scenarios_page.py

      # Build-only: validates the site compiles under --strict. No mike
      # deploy, no push to gh-pages — PRs must never mutate published docs.
      - name: Build documentation
        run: uv run --locked --no-build --no-binary-package arena mkdocs build --strict

  deploy_latest_documentation:
    name: Deploy latest documentation
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (full history for mike + git-revision-date plugins)
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install docs dependency group
        run: uv sync --locked --no-build --no-binary-package arena --group docs

      - name: Configure git identity for the gh-pages deploy commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Make gh-pages locally known before mike pushes to it. Harmless no-op
      # on the very first-ever deploy, when the branch doesn't exist yet.
      - name: Fetch existing gh-pages branch (if any)
        run: git fetch origin gh-pages --depth=1 || true

      # Regenerate docs/latest-reports.md from the live reports/leaderboard.json
      # and reports/latest.json (AAASM-4429) so the deployed page reflects
      # whatever `reports/` holds at deploy time — see
      # scripts/render_latest_reports_page.py. `mike deploy` below reuses this
      # same checkout, so this only needs to run once before both builds.
      - name: Render latest reports page
        run: uv run --locked --no-build --no-binary-package arena python scripts/render_latest_reports_page.py

      # Regenerate docs/agents-scenarios.md from the live agent manifests
      # under agents/official/ + agents/community/ and scenario specs under
      # scenarios/ (AAASM-4521) so the deployed catalog page reflects
      # whatever's on disk at deploy time — see
      # scripts/render_agents_scenarios_page.py.
      - name: Render agents & scenarios catalog page
        run: uv run --locked --no-build --no-binary-package arena python scripts/render_agents_scenarios_page.py

      # Pre-flight: fail fast if the build itself is broken before touching
      # gh-pages.
      - name: Build documentation (pre-flight)
        run: uv run --locked --no-build --no-binary-package arena mkdocs build --strict

      # Publish "latest" to gh-pages. --update-aliases lets mike reclaim
      # "latest" as a concrete version if older gh-pages state ever carried
      # it as an alias instead (mirrors python-sdk's deploy step).
      - name: Deploy latest documentation
        run: uv run --locked --no-build --no-binary-package arena mike deploy --push --update-aliases --title "latest (main)" latest

      # arena has no release workflow / version tags yet, so mkdocs.yml's
      # `extra.version.default: stable` alias (mirrored from python-sdk's
      # config in AAASM-4412) is never created. Point the gh-pages root
      # redirect at "latest" instead, so the standalone gh-pages site and
      # the docs hub aggregation (AAASM-4414) both resolve instead of
      # 404ing on a "stable" alias that won't exist until a release-channel
      # job is added in a future ticket.
      - name: Set default gh-pages redirect to "latest"
        run: uv run --locked --no-build --no-binary-package arena mike set-default --push latest
