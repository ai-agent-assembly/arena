name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    name: Lint, type-check, test, schema smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked --no-build --no-binary-package arena

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Type-check (mypy)
        run: uv run mypy src

      - name: Test (pytest)
        run: uv run pytest

      # AAASM-4363: Pydantic schemas for manifests/scenarios/reports don't
      # exist yet (they land in AAASM-4364/4368). Until they do, "schema
      # smoke check" means importing every arena subpackage so CI catches
      # broken imports/syntax errors early; this gains real schema
      # validation teeth once those tickets land.
      - name: Schema smoke check (import every arena package)
        run: |
          uv run python -c "
          import arena.cli
          import arena.agents
          import arena.integrations
          import arena.models
          import arena.registry
          import arena.reporting
          import arena.reports
          import arena.runner
          import arena.scenarios
          print('arena package imports OK')
          "
